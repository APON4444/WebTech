<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Registration Form</h2>
    <form action="submit_form.php" method="post">
        <label for="Full_Name">Full Name:</label><br>
        <input type="text" id="Full_Name" name="Full_Name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="Phone_Number">Phone Number:</label><br>
        <input type="tel" id="Phone_Number" name="Phone_Number"><br><br>

        <label for="Gender">Gender:</label><br>
        <input type="radio" id="male" name="Gender" value="Male">
        <label for="male">Male</label>
        <input type="radio" id="Female" name="Gender" value="Female">
        <label for="Female">Female</label>
        <input type="radio" id="other" name="Gender" value="Other">
        <label for="other">Other</label><br><br>

        <label for="Password">Password</label><br>
        <input type="password" id="Password" name="Password" required><br><br>


        <label for="Date_of_Birth">Date_of_Birth</label><br>
        <input type="date" id="Date_of_Birth" name="Date_of_Birth" required><br><br>


        <label for="Confirm_Password">Confirm Password</label><br>
        <input type="password" id="Confirm_Password" name="Confirm_Password" required><br><br>

        
        <label for="Address">Address</label><br>
        <textarea id="Address" name="Address" rows="5" cols="40"></textarea><br><br>

        <label for="Department">Department</label><br>

        <select id="Department" name="Department" required><br><br>
              <option value="CSE">CSE</option>
              <option value="BBA">BBA</option><br><br>
        </select>

        <br><br>



        <input type="submit" value="submit"><br><br>
        

    </form>
</body>
</html>
